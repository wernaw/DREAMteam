<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <title>Reports</title>

    <link rel="stylesheet" href="/static/style_reports.css">
</head>

<body>

<div class="container">

    <h1>Reports</h1>

    <div class="panel">

        <select>
            <option>Team 1</option>
        </select>

        <div class="table-header">
            <div>Candidate</div>
            <div>Role</div>
            <div>Answers</div>
        </div>

        <div id="reports"></div>

        <div class="actions">
            <button onclick="window.location.href='/recruiter/generator.html'">⭐ New team</button>
        </div>

    </div>
</div>

<script>

async function loadReports() {
    const res = await fetch("/api/results");
    const data = await res.json();

    let html = "";

    for (let i = 0; i < data.length; i++) {
        const c = data[i];

        let answersHtml = "";

        if (c.history) {
            for (let j = 0; j < c.history.length; j++) {
                const h = c.history[j];

                answersHtml +=
                    "<div class='answer'>" +
                        "<b>" + (h.role || "") + ":</b> " +
                        (h.content || "") +
                    "</div>";
            }
        }

        html +=
            "<div class='row " + (i === 0 ? "active" : "") + "'>" +

                "<div class='row-top'>" +
                    "<div>" +
                        "<div class='name'>" + (c.name || "") + "</div>" +
                        "<div class='role'>" + (c.role || "") + "</div>" +
                    "</div>" +
                "</div>" +

                "<div class='row-role'>" +
                    "Role: " + (c.role || "") +
                "</div>" +

                "<div class='row-answers'>" +
                    "<details>" +
                        "<summary>Show answers</summary>" +
                        "<div class='answers-box'>" +
                            answersHtml +
                        "</div>" +
                    "</details>" +
                "</div>" +

            "</div>";
    }

    document.getElementById("reports").innerHTML = html;
}

loadReports();

</script>

</body>
</html>
